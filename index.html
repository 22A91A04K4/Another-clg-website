<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>College Website</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Background */
.hero {
    height: 100vh;
    background: url('college.jpg') no-repeat center/cover;
    position: relative;
}

/* Title */
.title {
    position: absolute;
    top: 20px;
    left: 20px;
    color: black;
    font-size: 28px;
    font-weight: bold;
}

/* Menu Icon */
.menu-icon {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
}
.menu-icon div {
    width: 30px;
    height: 4px;
    background: black;
    margin: 6px;
}

/* Side Menu */
.side-menu {
    position: fixed;
    top: 0;
    right: -260px;
    width: 260px;
    height: 100%;
    background: #333;
    color: white;
    transition: 0.3s;
    padding-top: 60px;
    overflow-y: auto;
}
.side-menu.active {
    right: 0;
}

.side-menu a {
    display: block;
    padding: 15px;
    color: white;
    text-decoration: none;
    cursor: pointer;
}
.side-menu a:hover {
    background: #575757;
}

/* Dropdown */
.dropdown {
    display: none;
    background: #444;
}

.dropdown a {
    padding-left: 30px;
    font-size: 14px;
}

/* Sub Dropdown */
.sub-dropdown {
    display: none;
    background: #555;
}

.sub-dropdown a {
    padding-left: 50px;
    font-size: 13px;
}

/* IMAGE DISPLAY */
.image-box {
    display: none;
    padding: 20px;
    text-align: center;
    background: white;
}

.image-box img {
    width: 300px;
    margin: 10px;
    border-radius: 10px;
}
</style>

</head>

<body>

<!-- HERO SECTION -->
<div class="hero">
    <div class="title">Sandip University</div>

    <div class="menu-icon" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
    </div>
</div>

<!-- IMAGE DISPLAY AREA -->
<div id="displayArea" class="image-box"></div>

<!-- SIDE MENU -->
<div id="menu" class="side-menu">

    <!-- Courses -->
    <a onclick="toggleDropdown('coursesMenu')">Courses ▼</a>
    <div id="coursesMenu" class="dropdown">

        <a onclick="toggleSubDropdown('btechMenu')">B.Tech ▶</a>
        <div id="btechMenu" class="sub-dropdown">
            <a href="#">CSE</a>
            <a href="#">ECE</a>
            <a href="#">AIML</a>
            <a href="#">EEE</a>
            <a href="#">DS</a>
            <a href="#">MECH</a>
            <a href="#">IT</a>
            <a href="#">CIVIL</a>
        </div>

        <a onclick="toggleSubDropdown('mbaMenu')">MBA ▶</a>
        <div id="mbaMenu" class="sub-dropdown">
            <a href="#">Finance</a>
            <a href="#">Marketing</a>
            <a href="#">HR</a>
            <a href="#">Business Analytics</a>
        </div>

        <a onclick="toggleSubDropdown('bscMenu')">B.Sc ▶</a>
        <div id="bscMenu" class="sub-dropdown">
            <a href="#">Physics</a>
            <a href="#">Chemistry</a>
            <a href="#">Maths</a>
            <a href="#">CS</a>
        </div>

    </div>

    <!-- Library -->
    <a onclick="toggleDropdown('libraryMenu')">Library ▼</a>
    <div id="libraryMenu" class="dropdown">
        <a onclick="showLibrary()">View Library Photos</a>
    </div>

    <!-- Playground -->
    <a onclick="toggleDropdown('playgroundMenu')">Playground ▼</a>
    <div id="playgroundMenu" class="dropdown">
        <a onclick="showCricket()">Play Ground</a>
    </div>

    <!-- Fees -->
    <a onclick="toggleDropdown('feesMenu')">Fees ▼</a>
    <div id="feesMenu" class="dropdown">
        <a href="#">B.Tech Fees</a>
        <a href="#">MBA Fees</a>
    </div>

    <!-- Hostels -->
    <a onclick="toggleDropdown('hostelsMenu')">Hostels ▼</a>
    <div id="hostelsMenu" class="dropdown">
        <a onclick="showGirlsHostels()">Girls Hostel</a>
        <a onclick="showBoysHostels()">Boys Hostel</a>
        <a onclick="showMess()">Mess</a>
    </div>

</div>

<script>
function toggleMenu() {
    document.getElementById("menu").classList.toggle("active");
}

function toggleDropdown(id) {
    let dropdown = document.getElementById(id);
    let all = document.querySelectorAll('.dropdown');

    all.forEach(d => {
        if (d !== dropdown) d.style.display = "none";
    });

    dropdown.style.display = (dropdown.style.display === "block") ? "none" : "block";
}

function toggleSubDropdown(id) {
    let sub = document.getElementById(id);
    let all = document.querySelectorAll('.sub-dropdown');

    all.forEach(s => {
        if (s !== sub) s.style.display = "none";
    });

    sub.style.display = (sub.style.display === "block") ? "none" : "block";
}

/* IMAGE FUNCTIONS */

function showCricket() {
    let box = document.getElementById("displayArea");
    box.style.display = "block";
    box.innerHTML = `
        <h2>Ground</h2>
        <img src="play1.jpeg">
        <img src="play2.jpg">
    `;
    window.scrollTo(0, document.body.scrollHeight);
}

function showGirlsHostels() {
    let box = document.getElementById("displayArea");
    box.style.display = "block";
    box.innerHTML = `
        <h2>Girls Hostels </h2>
        <img src="girls hostel.png">
    `;
    window.scrollTo(0, document.body.scrollHeight);
}
function showBoysHostels() {
    let box = document.getElementById("displayArea");
    box.style.display = "block";
    box.innerHTML = `
        <h2>Boys Hostels </h2>
        <img src="hstl.jpg">
    `;
    window.scrollTo(0, document.body.scrollHeight);
}
function showMess() {
    let box = document.getElementById("displayArea");
    box.style.display = "block";
    box.innerHTML = `
        <h2>Mess </h2>
        <img src="mess.jpeg">
    `;
    window.scrollTo(0, document.body.scrollHeight);
}
        

function showLibrary() {
    let box = document.getElementById("displayArea");
    box.style.display = "block";
    box.innerHTML = `
        <h2>Library</h2>
        <img src="lib.jpg">
        <img src="lib1.webp">
    `;
    window.scrollTo(0, document.body.scrollHeight);
}
</script>

</body>
</html>
